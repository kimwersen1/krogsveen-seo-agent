name: Ukentlig SEO/GEO-rapport

# Aktiveres først når secrets under er lagt inn i repoet (steg 8 i oppsett-guiden).
# Cron er i UTC: 05:00 UTC = 07:00 Europe/Oslo sommertid (06:00 vintertid).
on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write # trengs for å committe docs/index.html tilbake til repoet (GitHub Pages)

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      # Secret-verdien er base64 av JSON-filen (se .env.example / oppsett-instruks) —
      # unngår at linjeskift/mellomrom i selve JSON-en korrumperes ved manuell
      # copy-paste inn i GitHub sitt secret-felt (skjedde 20.07.2026: filen kom ut
      # tom på runneren fordi rå-JSON-en ikke overlevde limingen).
      - name: Skriv service account-nøkkel til fil
        run: |
          mkdir -p credentials
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT_B64" | base64 -d > credentials/service-account.json
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT_B64 }}

      # Klikk/CTR per søkeord/side kommer nå automatisk via GSC OAuth (GOOGLE_OAUTH_*
      # under) hvis konfigurert — --gsc-query-export/--gsc-page-export (manuell CSV) er
      # kun en reserveløsning og ikke satt her.
      - name: Kjør ukesrapport
        env:
          AHREFS_API_KEY: ${{ secrets.AHREFS_API_KEY }}
          AHREFS_PROJECT_ID: ${{ secrets.AHREFS_PROJECT_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: credentials/service-account.json
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          # Valgfritt — ChatGPT-selvsjekken hopper stille over seg selv uten disse.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          # Valgfritt — direkte GSC-tilgang (se scripts/gsc_auth_setup.py). Pipeline
          # faller tilbake til manuell CSV-import hvis disse mangler.
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          # GA4 — samme OAuth-token som over (utvidet med analytics.readonly-scope,
          # 22.07.2026), kun property-ID-en er ny. _optional() håndterer tom-streng-fellen
          # trygt, se forklaringen under.
          GOOGLE_ANALYTICS_PROPERTY_ID: ${{ secrets.GOOGLE_ANALYTICS_PROPERTY_ID }}
          # GOOGLE_SEARCH_CONSOLE_PROPERTY er IKKE satt her med vilje — standardverdien i
          # settings.py (sc-domain:krogsveen.no) er riktig, og en GitHub-secret som ikke
          # finnes ville satt env-variabelen til en tom streng (ikke "usatt"), som
          # overstyrer Python sin default og feiler mot Search Console API (skjedde
          # 21.07.2026: 'http://' is not a valid Search Console site URL).
          #
          # Valgfrie — del av erstatningen for Ahrefs Brand Radar. Hopper stille over seg
          # selv uten nøkkel (settings._optional() håndterer tom-streng-secret-fallen nevnt
          # over, trygt å referere disse selv om secreten ikke finnes).
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          PERPLEXITY_MODEL: ${{ secrets.PERPLEXITY_MODEL }}
        run: python scripts/run_weekly.py

      # data/history.db er unntatt fra .gitignore med vilje — uten dette starter hver
      # kjøring med tom database (GitHub-runnere er engangsbruk), og trendgrafer/
      # tiltaks-historikk over flere uker ville aldri bygget seg opp.
      - name: Publiser dashboard og historikk-database
        run: |
          git config user.name "krogsveen-seo-agent"
          git config user.email "actions@github.com"
          git add docs/index.html data/history.db
          git diff --staged --quiet && echo "Ingen endringer å committe" || git commit -m "Oppdater dashboard og historikk — uke $(date +%V)"
          git push
