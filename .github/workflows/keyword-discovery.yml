name: Bi-ukentlig søkeordsoppdagelse og innholdsforslag

# To ganger i måneden (1. og 15., 06:00 UTC) — cron har ingen "hver 14. dag"-primitiv,
# så dette er den vanlige tilnærmingen til bi-ukentlig kadence. Skriver funn + Claude-
# genererte artikkelforslag til det løpende Drive-dokumentet (--to-drive). Kostnad:
# typisk 12 000-16 000 Ahrefs-enheter per kjøring (alle 8 konkurrenter) — under 35 %
# av månedlig kvote selv med to kjøringer/måned.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1,15 * *"

jobs:
  keyword-discovery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Skriv service account-nøkkel til fil
        run: |
          mkdir -p credentials
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT_B64" | base64 -d > credentials/service-account.json
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT_B64 }}

      - name: Kjør søkeordsoppdagelse
        env:
          AHREFS_API_KEY: ${{ secrets.AHREFS_API_KEY }}
          AHREFS_PROJECT_ID: ${{ secrets.AHREFS_PROJECT_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: credentials/service-account.json
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        run: python scripts/keyword_discovery.py --to-drive
